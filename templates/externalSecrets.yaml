{{- /*
  Plex chart: ExternalSecret for plex-autoskip (config.ini + token from 1Password, logging.ini, custom.json).
  Renders when skip.plexAutoskipConfig.create is "externalSecret". Mount via skip.persistence.config (type: secret, name: plex-auto-skip).
*/ -}}
{{- if and .Values.skip (kindIs "map" .Values.skip) (index .Values.skip "plexAutoskipConfig") (eq (index (index .Values.skip "plexAutoskipConfig") "create") "externalSecret") }}
{{- $ext := index (index .Values.skip "plexAutoskipConfig") "externalSecret" | default dict }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ $ext.secretName | default "plex-auto-skip" }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  refreshInterval: {{ $ext.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ $ext.secretStoreRef.name | default "onepassword-connect" }}
    kind: {{ $ext.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ $ext.secretName | default "plex-auto-skip" }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        config.ini: |
{{- $q := "\"" }}
{{- $plexToken := print "{{" " .plex_token " "}}" }}
{{- $t := include "plex_autoskip_config_ini_content" . }}
{{- $t = $t | replace "__PLEX_TOKEN__" (print $q $plexToken $q) }}
{{- if index ($ext.secretRefs | default dict) "plexUsername" }}
{{- $plexUsername := print "{{" " .plex_username " "}}" }}
{{- $t = $t | replace "__PLEX_USERNAME__" (print $q $plexUsername $q) }}
{{- else }}
{{- $t = $t | replace "__PLEX_USERNAME__" (print $q $q) }}
{{- end }}
{{- if index ($ext.secretRefs | default dict) "plexPassword" }}
{{- $plexPassword := print "{{" " .plex_password " "}}" }}
{{- $t = $t | replace "__PLEX_PASSWORD__" (print $q $plexPassword $q) }}
{{- else }}
{{- $t = $t | replace "__PLEX_PASSWORD__" (print $q $q) }}
{{- end }}
{{ $t | nindent 10 }}
        logging.ini: |
{{ include "plex_autoskip_logging_ini_content" . | nindent 10 }}
        custom.json: |
{{ include "plex_autoskip_custom_json_content" . | nindent 10 }}
  data:
    - secretKey: plex_token
      remoteRef:
        key: {{ (index ($ext.secretRefs | default dict) "plexToken" | default dict).key | default "plex" | quote }}
        property: {{ (index ($ext.secretRefs | default dict) "plexToken" | default dict).property | default "token" | quote }}
{{- if index ($ext.secretRefs | default dict) "plexUsername" }}
    - secretKey: plex_username
      remoteRef:
        key: {{ (index ($ext.secretRefs | default dict) "plexUsername").key | quote }}
        property: {{ (index ($ext.secretRefs | default dict) "plexUsername").property | quote }}
{{- end }}
{{- if index ($ext.secretRefs | default dict) "plexPassword" }}
    - secretKey: plex_password
      remoteRef:
        key: {{ (index ($ext.secretRefs | default dict) "plexPassword").key | quote }}
        property: {{ (index ($ext.secretRefs | default dict) "plexPassword").property | quote }}
{{- end }}
{{- end }}
